apiVersion: apps/v1
kind: Deployment
metadata:
  name: panacea-frontend
  namespace: panacea
spec:
  replicas: 2
  selector:
    matchLabels: {app: panacea-frontend}
  template:
    metadata:
      labels: {app: panacea-frontend}
    spec:
      containers:
        - name: frontend
          image: sjc.vultrcr.com/panacea/frontend:latest
          ports:
            - {name: http, containerPort: 3000}
          readinessProbe:
            httpGet: {path: /, port: http}
            initialDelaySeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: 500m, memory: 512Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: panacea-frontend
  namespace: panacea
spec:
  type: LoadBalancer
  selector: {app: panacea-frontend}
  ports:
    - {name: http, port: 80, targetPort: http}
